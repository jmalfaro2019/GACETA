name: Automated Congress Scraper

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scrapy requests python-dotenv

    - name: Run Scraper
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
      run: |
        cd gaceta_bot
        # We run the spider. It will check the API recursively and skip duplicates.
        # We limit to 2 pages for the automated check to avoid long runtimes.
        scrapy crawl congreso -a total_pages=2
